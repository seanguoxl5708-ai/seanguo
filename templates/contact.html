{% extends 'base.html' %}{% block content %}<h1>{{ t('contact.title') }}</h1><p class='muted'>{{ t('contact.muted') }}</p><form class='form' method='post' action='{{ url_for('contact') }}'><label>{{ t('contact.name') }}</label><input type='text' name='name' required /><label>{{ t('contact.email') }}</label><input type='email' name='email' placeholder='you@example.com' required /><label>{{ t('contact.message') }}</label><textarea name='message' rows='5' required></textarea><button type='submit' class='btn'>{{ t('contact.submit') }}</button></form><div class='muted small'>{{ t('contact.note') }}</div>{% endblock %}
