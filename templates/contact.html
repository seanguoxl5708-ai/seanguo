{% extends 'base.html' %}
{% block content %}
<h1>联系</h1>
<p class="muted">如需合作或了解更多，请填写以下信息（占位）。</p>

<form class="form" method="post" action="{{ url_for('contact') }}">
  <label>您的称呼</label>
  <input type="text" name="name" placeholder="张三" required />

  <label>邮箱</label>
  <input type="email" name="email" placeholder="you@example.com" required />

  <label>留言</label>
  <textarea name="message" rows="5" placeholder="想咨询的内容..." required></textarea>

  <button type="submit" class="btn">提交</button>
</form>

<div class="muted small">* 当前为演示站点，不会发送外部邮件。</div>
{% endblock %}
