{% extends 'base.html' %}
{% block content %}
  <article class="news-detail">
    <header>
      <h1>{{ post.title }}</h1>
      {% if post.date %}
        <div class="news-date">{{ post.date.strftime('%Y-%m-%d') }}</div>
      {% endif %}
    </header>
    
    <div class="news-content">
      {{ post.content | safe }}
    </div>
    
    <footer>
      <a class="btn" href="{{ url_for('news') }}">{{ t('home.back_to_news', '返回新闻列表') }}</a>
    </footer>
  </article>

  <style>
    .news-detail {
      max-width: 800px;
      margin: 2rem auto;
      line-height: 1.8;
    }
    .news-detail header {
      border-bottom: 2px solid #eee;
      padding-bottom: 2rem;
      margin-bottom: 2rem;
    }
    .news-detail h1 {
      margin-bottom: 0.5rem;
    }
    .news-detail .news-date {
      color: #666;
      font-size: 0.95rem;
    }
    .news-content {
      font-size: 1rem;
      color: #333;
    }
    .news-content p {
      margin-bottom: 1rem;
    }
    .news-content h2,
    .news-content h3 {
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .news-detail footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #eee;
    }
  </style>
{% endblock %}
